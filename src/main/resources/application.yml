server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/gdr-access

spring:
  application:
    name: gdr-access-backend
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE_NAME:XEPDB1}
    username: ${DB_USERNAME:GDR_ACCESS}
    password: ${DB_PASSWORD:gdr2026}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        default_schema: ${APP_DB_SCHEMA:${DB_USERNAME:GDR_ACCESS}}
  jackson:
    time-zone: America/Lima
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: ${DOCUMENTOS_TAMANIO_MAXIMO_MULTIPART:5MB}
      max-request-size: ${DOCUMENTOS_TAMANIO_MAXIMO_MULTIPART:5MB}

app:
  db:
    schema: ${APP_DB_SCHEMA:${DB_USERNAME:GDR_ACCESS}}
  jwt:
    secret: ${JWT_SECRET:change-this-jwt-secret-before-production-min-32-characters}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}
    issuer: ${JWT_ISSUER:GDR_ACCESS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  documentos:
    storage-base-path: ${DOCUMENTOS_RUTA_BASE:${user.home}/gdr-access-storage}
    max-file-size-bytes: ${DOCUMENTOS_TAMANIO_MAXIMO_BYTES:5242880}
    allowed-mime-types:
      - application/pdf
    firma-peru:
      proveedor-principal: ${FIRMA_PERU_PROVEEDOR_PRINCIPAL:FIRMA_PERU}
      url-inicio-base: ${FIRMA_PERU_URL_INICIO_BASE:https://www.gob.pe/firmadigital}
      integracion-oficial-habilitada: ${FIRMA_PERU_INTEGRACION_OFICIAL_HABILITADA:false}
      consulta-estado-habilitada: ${FIRMA_PERU_CONSULTA_ESTADO_HABILITADA:false}
      retorno-automatico-habilitado: ${FIRMA_PERU_RETORNO_AUTOMATICO_HABILITADO:false}
      mensaje-integracion: ${FIRMA_PERU_MENSAJE_INTEGRACION:El sistema queda preparado para Firma Peru, pero este entorno aun no tiene convenio, credenciales ni callback oficial habilitado.}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    pe.gob.gdr.access: DEBUG
