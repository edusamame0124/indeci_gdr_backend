server:
  port: ${GDR_SERVER_PORT:8082}
  servlet:
    context-path: /api/gdr-access

spring:
  application:
    name: gdr-access-backend

  datasource:
    url: ${GDR_DB_URL}
    username: ${GDR_DB_USERNAME}
    password: ${GDR_DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: ${GDR_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        default_schema: ${GDR_SCHEMA}

  jackson:
    time-zone: America/Lima
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: ${GDR_MAX_FILE_SIZE:10MB}
      max-request-size: ${GDR_MAX_FILE_SIZE:10MB}

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

# ============================
# APP CONFIG
# ============================
app:
  mail:
    default-from: ${GDR_MAIL_FROM:}

  db:
    default-schema: ${GDR_SCHEMA}

  jwt:
    secret: ${GDR_JWT_SECRET}
    access-token-expiration-ms: ${GDR_JWT_ACCESS_EXP:1800000}
    refresh-token-expiration-ms: ${GDR_JWT_REFRESH_EXP:86400000}
    issuer: ${GDR_JWT_ISSUER:GDR_ACCESS}

  cors:
    allowed-origins: ${GDR_CORS_ALLOWED:http://localhost:4200}

  documentos:
    storage-base-path: ${GDR_STORAGE_PATH}
    max-file-size-bytes: ${GDR_MAX_FILE_BYTES:10485760}
    allowed-mime-types:
      - application/pdf

    firma-peru:
      proveedor-principal: ${GDR_FIRMA_PROVEEDOR:FIRMA_PERU}
      url-inicio-base: ${GDR_FIRMA_URL:https://www.gob.pe/firmadigital}
      integracion-oficial-habilitada: ${GDR_FIRMA_ENABLED:false}
      consulta-estado-habilitada: ${GDR_FIRMA_CONSULTA:false}
      retorno-automatico-habilitado: ${GDR_FIRMA_RETORNO:false}

  # Formato GDR PDF generado (OpenPDF)
  formato-gdr-pdf:
    entity-name: "${GDR_FORMATO_GDR_ENTITY:Instituto Nacional de Defensa Civil}"
    entity-tagline: "${GDR_FORMATO_GDR_TAGLINE:Comprando para la Seguridad y Defensa Nacional}"
    header-logo-path: "${GDR_FORMATO_GDR_HEADER_LOGO:classpath:assets/formato_gdr/logo_institucional.png}"
    form-version: ${GDR_FORMATO_GDR_VERSION:v01}
    form-revision: "${GDR_FORMATO_GDR_REVISION:Rev: nov-2025}"
    servir-footer-note: "${GDR_FORMATO_GDR_SERVIR_FOOTER:AUTORIDAD NACIONAL DEL SERVICIO CIVIL - SERVIR}"
    draft-banner-note: "${GDR_FORMATO_GDR_DRAFT_BANNER:BORRADOR: Datos según avance al momento. Cierre de evaluación pendiente; no sustituye acta consolidada.}"

    segment-display-aliases:
      GENERAL: EJECUTOR

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    pe.gob.gdr.access: DEBUG